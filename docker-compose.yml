services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: client_categorization
      DATABASE_URL: postgresql://dev:dev@localhost:5432/client_categorization?schema=public
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
